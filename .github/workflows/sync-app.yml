name: Sync Anvil app content

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key for Anvil git remote
        env:
          ANVIL_SSH_KEY_B64: ${{ secrets.ANVIL_SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$ANVIL_SSH_KEY_B64" | base64 -d > ~/.ssh/anvil_id
          chmod 600 ~/.ssh/anvil_id

      - name: Check for new commits in the Anvil app repo
        id: check
        env:
          APP_GIT_URL: ${{ vars.ANVIL_APP_GIT_URL }}
          APP_BRANCH: ${{ vars.ANVIL_APP_BRANCH }}
          GIT_SSH_COMMAND: "ssh -i /home/runner/.ssh/anvil_id -o StrictHostKeyChecking=accept-new"
        run: |
          ref="${APP_BRANCH:-HEAD}"
          latest=$(git ls-remote "$APP_GIT_URL" "$ref" | head -n1 | cut -f1)
          if [ -z "$latest" ]; then
            echo "Could not resolve latest commit for $APP_GIT_URL@$ref" >&2
            exit 1
          fi
          prev=$(cat state/last-app-sha.txt 2>/dev/null || true)
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$latest" != "$prev" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Redeploy Railway service
        if: steps.check.outputs.changed == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway redeploy \
            --project "${{ vars.RAILWAY_PROJECT_ID }}" \
            --service "${{ vars.RAILWAY_SERVICE }}" \
            --environment "${{ vars.RAILWAY_ENVIRONMENT }}" \
            --yes

      - name: Record deployed SHA
        if: steps.check.outputs.changed == 'true'
        run: |
          mkdir -p state
          echo "${{ steps.check.outputs.latest }}" > state/last-app-sha.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/last-app-sha.txt
          git commit -m "chore: sync deployed Anvil app SHA to ${{ steps.check.outputs.latest }}"
          git push
